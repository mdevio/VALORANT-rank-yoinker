name: Build

env:
  PYTHON_VERSION: '3.14.5'
  PYTHON_BUILD_VERSION: '3.14'

on:
  push:
    branches:
      - 'main'
    
  pull_request:
    types: [review_requested]

  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: 'requirements.txt'
            
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install cx_Freeze
        run: pip install cx_Freeze
      
      - name: Build Native Executable
        run: python setup.py build

      - name: Copy docs into build output
        shell: pwsh
        run: |
          Copy-Item -Path "docs" -Destination "build/exe.win-amd64-${{ env.PYTHON_BUILD_VERSION }}/docs" -Recurse -Force

      - name: Get short commit hash
        id: commit
        shell: pwsh
        env:
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          $short = $env:COMMIT_SHA.Substring(0, 7)
          "short=$short" >> $env:GITHUB_OUTPUT

      - name: Show build output
        shell: pwsh
        run: |
          python --version
          Get-ChildItem "build/exe.win-amd64-${{ env.PYTHON_BUILD_VERSION }}" -Recurse
          
      - name: Upload Compiled Version
        uses: actions/upload-artifact@v4
        with:
          name: VALORANT-rank-yoinker-${{ steps.commit.outputs.short }}
          path: build/exe.win-amd64-${{ env.PYTHON_BUILD_VERSION }}/**
          if-no-files-found: error